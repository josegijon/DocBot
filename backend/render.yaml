services:
  - type: web
    name: docbot-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: ./storage/chroma
      - key: UPLOAD_DIR
        value: ./storage/uploads
      - key: MAX_PDF_SIZE_MB
        value: "50"
